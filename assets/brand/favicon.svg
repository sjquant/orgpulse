<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="orgpulse-favicon-title orgpulse-favicon-desc">
  <title id="orgpulse-favicon-title">OrgPulse favicon</title>
  <desc id="orgpulse-favicon-desc">Simplified OrgPulse favicon with a segmented ring and upward pulse signal.</desc>
  <defs>
    <linearGradient id="orgpulse-favicon-gradient" x1="18%" y1="0%" x2="82%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
  </defs>

  <circle cx="32" cy="32" r="28" fill="#f8fafc" />
  <circle cx="32" cy="32" r="24" fill="none" stroke="#0f172a" stroke-width="4.5" opacity="0.16" />
  <circle
    cx="32"
    cy="32"
    r="24"
    fill="none"
    stroke="#0f172a"
    stroke-width="4.5"
    stroke-linecap="round"
    stroke-dasharray="128 1000"
    transform="rotate(-18 32 32)"
  />
  <circle
    cx="32"
    cy="32"
    r="24"
    fill="none"
    stroke="#06b6d4"
    stroke-width="4.5"
    stroke-linecap="round"
    stroke-dasharray="9 1000"
    transform="rotate(-42 32 32)"
  />

  <path
