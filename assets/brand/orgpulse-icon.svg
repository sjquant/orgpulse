  <circle cx="30" cy="64" r="4" fill="#ffffff" stroke="#2563eb" stroke-width="3" />
  <circle cx="48" cy="64" r="4.5" fill="#ffffff" stroke="#3b82f6" stroke-width="3" />
  <circle cx="66" cy="46" r="4" fill="#ffffff" stroke="#0891b2" stroke-width="3" />
  <circle cx="95" cy="46" r="7" fill="#06b6d4" />
  <circle cx="66" cy="82" r="3.5" fill="#ffffff" stroke="#94a3b8" stroke-width="2.5" />
  <circle cx="92" cy="82" r="3.5" fill="#ffffff" stroke="#94a3b8" stroke-width="2.5" />
