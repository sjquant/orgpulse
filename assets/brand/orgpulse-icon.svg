<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="orgpulse-icon-title orgpulse-icon-desc">
  <title id="orgpulse-icon-title">OrgPulse icon</title>
  <desc id="orgpulse-icon-desc">A segmented ring framing a branching pulse path for the OrgPulse brand mark.</desc>
  <defs>
    <linearGradient id="orgpulse-icon-gradient" x1="18%" y1="0%" x2="82%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
  </defs>

  <circle cx="64" cy="64" r="56" fill="#f8fafc" />
  <circle cx="64" cy="64" r="50" fill="none" stroke="#0f172a" stroke-width="8" opacity="0.18" />
  <circle
    cx="64"
    cy="64"
    r="50"
    fill="none"
    stroke="#0f172a"
    stroke-width="8"
    stroke-linecap="round"
    stroke-dasharray="264 1000"
    transform="rotate(-18 64 64)"
  />
  <circle
    cx="64"
    cy="64"
    r="50"
    fill="none"
    stroke="#06b6d4"
    stroke-width="8"
    stroke-linecap="round"
    stroke-dasharray="18 1000"
